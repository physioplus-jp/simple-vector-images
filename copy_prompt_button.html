  <h2 style="font-size:17px;font-weight:700;color:#2e2e40;margin:0 0 20px 0;letter-spacing:0.01em;">
    シンプル／ベクター調の画像生成プロンプト
  </h2>

  <button id="copyPromptBtn" style="
    padding:12px 26px;
    background:#2e2e40;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.02em;
    transition:background 0.2s ease, transform 0.1s ease;
  " onmouseover="this.style.background='#46465f'" onmouseout="this.style.background='#2e2e40'" onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform='scale(1)'">
    プロンプトをコピー
  </button>

  <p style="font-size:12px;color:#888;margin:12px 0 0 0;">
    ※ボタンをクリックするとプロンプトがコピーされます。
  </p>

  <p style="font-size:13px;margin:28px 0 0 0;">
    <a href="https://docs.google.com/document/d/1VBm0gTO-aqAL0TZtGl4G-bbZ8HZjrALQ4VaE51Hl9Fg/edit?usp=sharing" target="_blank" rel="noopener" style="color:#2e2e40;text-decoration:underline;">
      プロンプト全文を確認する場合はこちら
    </a>
  </p>

</div>

<script>
(function () {
  var btn = document.getElementById('copyPromptBtn');
  var originalLabel = btn.textContent;

  var promptText = `添付した写真または入力したテキストに基づいて以下の指示に基づいた画像を生成してください。
#スタイル
フラットデザイン（Flat Design）、ベクターアート（Vector Art）。
#特徴
フェイスレス（Faceless）: 目、鼻、口などの顔のパーツが描かれておらず、個性を排除して「誰にでも当てはまる」普遍性を持たせている。
#アウトライン
なし（Lineless/No Outlines）: 黒い輪郭線を使わず、色の面だけで形を表現している（※動きを示す矢印など一部の記号的表現を除く）。
#シェーディング（陰影）
グラデーションを使わず、単色（ベタ塗り）か、非常にシンプルな2階調の影（セルフシャドウ）のみで立体感を表現。
#配色
「彩度を抑えたミュートトーンの配色を使用する。全体は低彩度・中明度の落ち着いた色調で統一する。背景は白（#FFFFFF）のホワイトスペース。衣服や髪はブラック系のカラーを使用し、原色や高彩度の色は使用しない。
#背景
素材としての使いやすさを考慮し、特に文脈上の指定がない限り「白背景 (white background)」またはシンプルな単色背景 (solid color background)」を指定する。
プロポーション: わずかにデフォルメされているが、極端ではなく、人体構造として違和感のないリアリティを残している。`;

  function showCopied() {
    btn.textContent = 'コピーしました！';
    btn.style.background = '#1f8a4c';
    setTimeout(function () {
      btn.textContent = originalLabel;
      btn.style.background = '#2e2e40';
    }, 1800);
  }

  btn.addEventListener('click', function () {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(promptText).then(showCopied).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
  });

  function fallbackCopy() {
    var textarea = document.createElement('textarea');
    textarea.value = promptText;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showCopied();
    } catch (e) {
      alert('コピーに失敗しました。お使いのブラウザではこの機能がサポートされていない可能性があります。');
    }
    document.body.removeChild(textarea);
  }
})();
</script>
